<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puppy Lovers Page</title>
    <link rel="stylesheet" type="text/css" href="Puppy_lovers.css"/>
</head>
<body>
    <div class="outer-wrapper">
        <header class="header-wrapper">
            <div class="internal-wrapper">
                <h1>Puppy lovers page</h1>
            </div>
        </header>

        <div class="banner-wrapper">
            <img src="banner-puppies.jpg" alt="Three puppies in a basket">
        </div>

        <main class="internal-wrapper">
            <div class="flex-row">
                <div class="col-3">
                    <img src="puppy-1.jpg" alt="White fluffy puppy">
                </div>
                <div class="col-3 missing-box">
                    <p>Puppy<br>missing<br>here!!</p>
                </div>
                <div class="col-3">
                    <img src="puppy-2.jpg" alt="Black and white puppy">
                </div>
            </div>

            <div class="section-title">
                <h2>More Puppies</h2>
            </div>

            <div class="flex-row">
                <div class="col-2">
                    <img src="puppy-3.jpg" alt="Person holding a black puppy">
                </div>
                <div class="col-2">
                    <img src="puppy-4.jpg" alt="White puppy lying on carpet">
                </div>
            </div>
        </main>

        <footer class="footer-wrapper">
            <div class="internal-wrapper">
                <h2>Developed by: Musab ELias</h2>
            </div>
        </footer>
    </div> 
</body>
</html>
